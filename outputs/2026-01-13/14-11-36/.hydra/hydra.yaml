hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - +experiment=dl3dv
    - dataset.test_chunk_interval=1
    - model.encoder.upsample_factor=8
    - model.encoder.lowest_feature_resolution=8
    - dataset.roots=[/data/longwei/3D/datasets/dl3dv]
    - model.encoder.monodepth_vit_type=vits
    - checkpointing.pretrained_model=checkpoints/idesplat-dl3dv-256x448-randview2-6.ckpt
    - mode=test
    - dataset/view_sampler=evaluation
    - dataset.view_sampler.num_context_views=4
    - dataset.view_sampler.index_path=assets/dl3dv_start_0_distance_50_ctx_4v_video_0_50.json
    - model.encoder.num_scales=1
  job:
    name: main
    chdir: null
    override_dirname: +experiment=dl3dv,checkpointing.pretrained_model=checkpoints/idesplat-dl3dv-256x448-randview2-6.ckpt,dataset.roots=[/data/longwei/3D/datasets/dl3dv],dataset.test_chunk_interval=1,dataset.view_sampler.index_path=assets/dl3dv_start_0_distance_50_ctx_4v_video_0_50.json,dataset.view_sampler.num_context_views=4,dataset/view_sampler=evaluation,mode=test,model.encoder.lowest_feature_resolution=8,model.encoder.monodepth_vit_type=vits,model.encoder.num_scales=1,model.encoder.upsample_factor=8
    id: ???
    num: ???
    config_name: main
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /home/longwei/3D/3DGS/IDESplat
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/longwei/3D/3DGS/IDESplat/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /home/longwei/3D/3DGS/IDESplat/outputs/2026-01-13/14-11-36
    choices:
      experiment: dl3dv
      model/decoder: splatting_cuda
      model/encoder: idesplat
      dataset: dl3dv
      dataset/view_sampler: evaluation
      dataset/view_sampler_dataset_specific_config: evaluation_dl3dv
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
